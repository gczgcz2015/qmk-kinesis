name: Build firmware

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli:latest

    steps:
      - name: Check out keyboard repository
        uses: actions/checkout@v4

      - name: Check out pinned Vial-QMK
        uses: actions/checkout@v4
        with:
          repository: vial-kb/vial-qmk
          ref: 00fc4627cd038ac9b7e9b8bf2b40b50e9e88aecb
          submodules: recursive
          path: vial-qmk

      - name: Validate matrix, VIA, and Vial definitions
        run: python3 scripts/validate_layout.py

      - name: Overlay the modified 5x7 target
        run: cp -R keyboards/. vial-qmk/keyboards/

      - name: Compile RP2040 Vial firmware
        run: make -C vial-qmk handwired/dactyl_manuform/5x7:vial

      - name: Collect firmware
        run: |
          mkdir -p dist
          cp vial-qmk/handwired_dactyl_manuform_5x7_vial.uf2 dist/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: kinesis-dactyl-5x7-vial-firmware
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: kinesis-dactyl-5x7-vial-firmware
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
